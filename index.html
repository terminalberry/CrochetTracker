<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crochet Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    padding: 15px;
    font-size: 18px;
}

.box {
    background: white;
    padding: 20px;
    margin: 12px auto;
    border-radius: 12px;
    max-width: 420px;
}

.title {
    font-size: 16px;
    font-weight: bold;
    color: #444;
}

.big {
    font-size: 34px;
    font-weight: 900;
    margin: 10px 0;
}

button {
    margin: 4px;
    padding: 10px 14px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    border: none;
    background: #ddd;
}

.remaining {
    font-size: 26px;
    font-weight: 900;
    color: #1b5e20;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>🧶 Crochet Tracker</h2>

<!-- ТАЙМЕР -->
<div class="box">
    <div class="title">Таймер</div>
    <div class="big" id="time">00:00:00</div>

    <button onclick="start()">Старт</button>
    <button onclick="pause()">Пауза</button>
    <button onclick="stop()">Стоп</button>

    <div class="title">Последно време</div>
    <div id="lastTime">--</div>
</div>

<!-- ШЕВОВЕ -->
<div class="box">
    <div class="title">Брой шевове</div>
    <div class="big" id="stitches">0</div>

    <button onclick="st(-1)">-1</button>
    <button onclick="st(1)">+1</button>
    <button onclick="st(5)">+5</button>
    <button onclick="st(10)">+10</button>
    <button onclick="resetSt()">Занули</button>
</div>

<!-- РЕДОВЕ -->
<div class="box">
    <div class="title">Текущ ред (row)</div>
    <div class="big" id="rows">0</div>

    <button onclick="rw(-1)">-1</button>
    <button onclick="rw(1)">+1</button>
    <button onclick="resetRw()">Занули</button>

    <br><br>

    <div class="title">Общо редове</div>
    <input id="total" type="number" value="19">

    <div class="remaining">
        Остават: <span id="rem">19</span> rows
    </div>
</div>

<button onclick="hardReset()">🔄 Презареди / Изчисти бисквитки</button>

<script>
// ===== STATE =====
let data = JSON.parse(localStorage.getItem("crochet")) || {
    seconds: 0,
    stitches: 0,
    rows: 0,
    total: 19,
    lastTime: "--"
};

let timer = null;

// ===== SAVE =====
function save() {
    localStorage.setItem("crochet", JSON.stringify(data));
}

// ===== RENDER =====
function render() {
    let s = data.seconds;
    let h = Math.floor(s/3600);
    let m = Math.floor((s%3600)/60);
    let sec = s%60;

    document.getElementById("time").innerText =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;

    document.getElementById("stitches").innerText = data.stitches;
    document.getElementById("rows").innerText = data.rows;
    document.getElementById("lastTime").innerText = data.lastTime;
    document.getElementById("total").value = data.total;

    let rem = data.total - data.rows;
    if (rem < 0) rem = 0;
    document.getElementById("rem").innerText = rem;
}

// ===== TIMER =====
function tick() {
    data.seconds++;
    render();
    save();
}

function start() {
    if (!timer) timer = setInterval(tick, 1000);
}

function pause() {
    clearInterval(timer);
    timer = null;
}

function stop() {
    pause();
    data.lastTime = document.getElementById("time").innerText;
    data.seconds = 0;
    render();
    save();
}

// ===== STITCHES =====
function st(v) {
    data.stitches += v;
    if (data.stitches < 0) data.stitches = 0;
    render(); save();
}
function resetSt() {
    data.stitches = 0;
    render(); save();
}

// ===== ROWS =====
function rw(v) {
    data.rows += v;
    if (data.rows < 0) data.rows = 0;
    render(); save();
}
function resetRw() {
    data.rows = 0;
    render(); save();
}

document.getElementById("total").addEventListener("input", e => {
    data.total = parseInt(e.target.value) || 0;
    render(); save();
});

// ===== Reset page cookies =====
function hardReset() {
    // 🧹 localStorage
    localStorage.clear();

    // 🍪 cookies
    document.cookie.split(";").forEach(c => {
        document.cookie = c
            .replace(/^ +/, "")
            .replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");
    });

    // ⚙️ service worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
            for (let reg of regs) {
                reg.unregister();
            }
        });
    }

    // 💾 cache storage
    if ('caches' in window) {
        caches.keys().then(names => {
            names.forEach(name => caches.delete(name));
        });
    }

    // 🔄 reload
    setTimeout(() => {
        location.reload(true);
    }, 500);
}

// INIT
render();

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
